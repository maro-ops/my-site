<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MARO STORE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  background:#111a2e;
  align-items:center;
}

.logo{
  font-size:24px;
  font-weight:bold;
  color:#38bdf8;
  text-shadow:0 0 10px #38bdf8;
}

.nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
}

.nav a:hover{
  color:#38bdf8;
}

/* HERO */
.hero{
  text-align:center;
  margin-top:80px;
}

.hero h1{
  font-size:50px;
}

.hero p{
  color:#cbd5e1;
  font-size:18px;
  margin-top:10px;
}

/* strong sentence */
.big-text{
  text-align:center;
  font-size:28px;
  margin-top:25px;
  color:#38bdf8;
  font-weight:bold;
}

/* button */
.btn{
  margin-top:25px;
  padding:14px 28px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #38bdf8;
}

/* features */
.features{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:70px;
  flex-wrap:wrap;
  padding:20px;
}

.card{
  background:#111a2e;
  padding:20px;
  width:220px;
  border-radius:15px;
  transition:0.3s;
  text-align:center;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #38bdf8;
}
</style>

</head>

<body>

<div class="nav">
  <div class="logo">MARO</div>

  <div>
    <a href="index.html">Home</a>
    <a href="cv.html">Bioo</a>
    <a href="shop.html">Store</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Welcome to MARO Store</h1>
  <p>Official Website & Fashion Brand</p>

  <button class="btn" onclick="location.href='shop.html'">
    Shop Now
  </button>
</div>

<!-- BIG LINE -->
<div class="big-text">
  “Style is not what you wear, it’s what you express.”
</div>

<!-- FEATURES -->
<div class="features">

  <div class="card">
    <h3>Quality</h3>
    <p>Premium materials</p>
  </div>

  <div class="card">
    <h3>Fast</h3>
    <p>Quick service</p>
  </div>

  <div class="card">
    <h3>Best Price</h3>
    <p>Affordable fashion</p>
  </div>

</div>

</body>
</html>
