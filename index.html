<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MARO STORE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

.nav{
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  background:#111a2e;
  align-items:center;
}

.logo{
  font-size:24px;
  font-weight:bold;
  color:#38bdf8;
  letter-spacing:3px;
  text-shadow:0 0 10px #38bdf8;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from {text-shadow:0 0 5px #38bdf8;}
  to {text-shadow:0 0 20px #38bdf8;}
}

.nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  transition:0.3s;
}

.nav a:hover{
  color:#38bdf8;
}

.hero{
  text-align:center;
  margin-top:120px;
}

.hero h1{
  font-size:45px;
}

.hero p{
  color:#cbd5e1;
}

button{
  margin-top:25px;
  padding:14px 28px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #38bdf8;
}
</style>

</head>

<body>

<div class="nav">
  <div class="logo">MARO</div>

  <div>
    <a href="index.html">Home</a>
    <a href="cv.html">Bioo</a>
    <a href="shop.html">Store</a>
  </div>
</div>

<div class="hero">
  <h1>Welcome to MARO STORE</h1>
  <p>Premium Fashion Brand</p>

  <button onclick="location.href='cv.html'">
    Get Started
  </button>
</div>

</body>
</html>
