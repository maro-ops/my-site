<!DOCTYPE html>
<html lang="en">
<head>

<meta name="google-site-verification" content="yLfRkaSSi0HdiN_Rc1uxkYVwgCy6kfR9sBT7i4Fg-dY" />

<meta charset="UTF-8">
<title>MARO STORE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
}

/* UP ANIMATION */
@keyframes up {
  from {
    opacity:0;
    transform:translateY(40px);
  }
  to {
    opacity:1;
    transform:translateY(0);
  }
}

.up{
  opacity:0;
  animation:up 0.8s ease forwards;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:#0f172a;
}

.logo{
  font-size:26px;
  font-weight:bold;
  color:#38bdf8;
  letter-spacing:4px;
}

.nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
}

/* HERO */
.hero{
  text-align:center;
  margin-top:100px;
}

.hero h1{
  font-size:50px;
}

.hero p{
  color:#cbd5e1;
}

/* BUTTON */
.btn{
  margin-top:25px;
  padding:14px 30px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #38bdf8;
}

/* FEATURES */
.features{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-top:70px;
  padding:20px;
}

.card{
  background:#111827;
  width:220px;
  padding:22px;
  border-radius:15px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #38bdf8;
}
</style>

</head>

<body>

<div class="nav up">
  <div class="logo">MARO</div>

  <div>
    <a href="index.html">Home</a>
    <a href="cv.html">Bioo</a>
    <a href="shop.html">Store</a>
  </div>
</div>

<div class="hero">

  <h1 class="up" style="animation-delay:0.2s">
    Welcome to MARO Store
  </h1>

  <p class="up" style="animation-delay:0.4s">
    Official Fashion Brand Website
  </p>

  <button class="btn up"
  style="animation-delay:0.6s"
  onclick="location.href='shop.html'">

    Go to Store

  </button>

</div>

<div class="features">

  <div class="card up" style="animation-delay:0.8s">
    <h3>Quality</h3>
    <p>Premium materials</p>
  </div>

  <div class="card up" style="animation-delay:1s">
    <h3>Design</h3>
    <p>Modern streetwear style</p>
  </div>

  <div class="card up" style="animation-delay:1.2s">
    <h3>Price</h3>
    <p>Affordable fashion</p>
  </div>

</div>

</body>
</html>
