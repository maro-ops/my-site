<!DOCTYPE html>
<html lang="en">
<head>

<meta name="google-site-verification" content="yLfRkaSSi0HdiN_Rc1uxkYVwgCy6kfR9sBT7i4Fg-dY" />

<meta charset="UTF-8">
<title>MARO STORE</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
  overflow-x:hidden;
}

/* ANIMATION */

@keyframes up{
  from{
    opacity:0;
    transform:translateY(40px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

.up{
  opacity:0;
  animation:up 0.8s ease forwards;
}

/* NAVBAR */

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background:#0f172a;
}

.logo{
  font-size:28px;
  font-weight:bold;
  color:#38bdf8;
  letter-spacing:4px;
}

.nav a{
  color:white;
  text-decoration:none;
  margin-left:25px;
  transition:0.3s;
}

.nav a:hover{
  color:#38bdf8;
}

/* HERO */

.hero{
  text-align:center;
  margin-top:110px;
  padding:20px;
}

.hero h1{
  font-size:55px;
  margin-bottom:20px;
}

.hero p{
  font-size:24px;
  color:#cbd5e1;
  line-height:1.8;
}

/* BUTTON */

.btn{
  margin-top:35px;
  padding:15px 35px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  color:black;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.06);
  box-shadow:0 0 20px #38bdf8;
}

/* FEATURES */

.features{
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
  margin-top:90px;
  padding:20px;
}

.card{
  background:#111827;
  width:230px;
  padding:25px;
  border-radius:16px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 18px #38bdf8;
}

.card h3{
  margin-bottom:10px;
}

.card p{
  color:#cbd5e1;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="nav up">

  <div class="logo">MARO</div>

  <div>
    <a href="index.html">Home</a>
    <a href="cv.html">Bioo</a>
    <a href="shop.html">Store</a>
  </div>

</div>

<!-- HERO -->

<div class="hero">

  <h1 class="up" style="animation-delay:0.2s">
    Welcome to MARO Store
  </h1>

  <p 
  class="up" 
  style="animation-delay:0.4s; direction:rtl;">

    سيتم افتتاح MARO STORE قريبًا...<br>

     انتظرونا 🔥

  </p>

  <button
  class="btn up"
  style="animation-delay:0.6s"
  onclick="location.href='shop.html'">

    Go to Store

  </button>

</div>

<!-- FEATURES -->

<div class="features">

  <div class="card up" style="animation-delay:0.8s">
    <h3>Quality</h3>
    <p>Premium materials</p>
  </div>

  <div class="card up" style="animation-delay:1s">
    <h3>Design</h3>
    <p>Modern streetwear style</p>
  </div>

  <div class="card up" style="animation-delay:1.2s">
    <h3>Price</h3>
    <p>Affordable fashion</p>
  </div>

</div>

</body>
</html>
