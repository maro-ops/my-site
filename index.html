<!DOCTYPE html>
<html>
<head>
  <title>موقعي الأول</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      margin-top: 100px;
    }

    .box {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 15px;
      display: inline-block;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: black;
      color: white;
    }
  </style>

</head>

<body>

  <div class="box">
    <h1>أهلاً بيك 👋</h1>
    <p>ده أول موقع احترافي ليا 🚀</p>

    <button onclick="alert('جامد 🔥')">
      دوس هنا
    </button>
  </div>

</body>
</html>
