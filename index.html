<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MARO | Luxury Brand</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
  animation:fade 0.6s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:#0f172a;
}

.logo{
  font-size:26px;
  font-weight:bold;
  color:#38bdf8;
  letter-spacing:5px;
}

.nav a{
  color:white;
  text-decoration:none;
  margin-left:25px;
}

.nav a:hover{
  color:#38bdf8;
}

/* HERO */
.hero{
  text-align:center;
  margin-top:100px;
}

.hero h1{
  font-size:48px;
}

.hero p{
  color:#cbd5e1;
  margin-top:10px;
}

.btn{
  margin-top:25px;
  padding:14px 30px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #38bdf8;
}

/* FEATURES */
.features{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:70px;
  flex-wrap:wrap;
}

.card{
  background:#111827;
  padding:25px;
  width:220px;
  border-radius:16px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #38bdf8;
}
</style>

</head>

<body>

<div class="nav">
  <div class="logo">MARO</div>

  <div>
    <a href="index.html">Home</a>
    <a href="cv.html">Bioo</a>
    <a href="shop.html">Store</a>
  </div>
</div>

<div class="hero">
  <h1>MARO Luxury Fashion</h1>
  <p>Minimal design. Maximum identity.</p>

  <button class="btn" onclick="location.href='shop.html'">
    Explore Collection
  </button>
</div>

<div class="features">

  <div class="card">
    <h3>Premium</h3>
    <p>High quality fabrics</p>
  </div>

  <div class="card">
    <h3>Modern</h3>
    <p>Clean streetwear style</p>
  </div>

  <div class="card">
    <h3>Affordable</h3>
    <p>Best prices in EGP</p>
  </div>

</div>

</body>
</html>
