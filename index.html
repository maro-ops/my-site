<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MARO STORE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
  overflow:hidden;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:#0f172a;
  opacity:0;
  transform:translateY(-20px);
  animation:navIn 0.8s ease forwards;
}

.logo{
  font-size:26px;
  font-weight:bold;
  color:#38bdf8;
}

.nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
}

.nav a:hover{
  color:#38bdf8;
}

/* HERO */
.hero{
  text-align:center;
  margin-top:120px;
}

.hero h1{
  font-size:52px;
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 1s ease forwards;
  animation-delay:0.4s;
}

.hero p{
  color:#cbd5e1;
  margin-top:10px;
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 1s ease forwards;
  animation-delay:0.7s;
}

/* BUTTON */
.btn{
  margin-top:25px;
  padding:14px 30px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  cursor:pointer;

  opacity:0;
  transform:scale(0.8);
  animation:pop 1s ease forwards;
  animation-delay:1s;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px #38bdf8;
}

/* ANIMATIONS */
@keyframes navIn{
  to{opacity:1;transform:translateY(0);}
}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0);}
}

@keyframes pop{
  to{opacity:1;transform:scale(1);}
}

/* FLOAT EFFECT BACKGROUND */
.glow{
  position:absolute;
  width:300px;
  height:300px;
  background:#38bdf8;
  filter:blur(120px);
  opacity:0.2;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  animation:moveGlow 6s infinite alternate;
}

@keyframes moveGlow{
  from{transform:translateX(-50%) translateY(0);}
  to{transform:translateX(-50%) translateY(40px);}
}
</style>

</head>

<body>

<div class="glow"></div>

<div class="nav">
  <div class="logo">MARO</div>

  <div>
    <a href="index.html">Home</a>
    <a href="cv.html">Bioo</a>
    <a href="shop.html">Store</a>
  </div>
</div>

<div class="hero">
  <h1>Welcome to MARO Store</h1>
  <p>Official Fashion Brand Website</p>

  <button class="btn" onclick="location.href='shop.html'">
    Go to Store
  </button>
</div>

</body>
</html>
