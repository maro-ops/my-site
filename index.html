<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MARO STORE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
  animation:fadeIn 0.8s ease;
}

/* دخول الصفحة */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:#0f172a;

  opacity:0;
  transform:translateY(-20px);
  animation:navIn 0.8s ease forwards;
}

@keyframes navIn{
  to{opacity:1;transform:translateY(0);}
}

.logo{
  font-size:26px;
  font-weight:bold;
  color:#38bdf8;
  letter-spacing:4px;
}

.nav a{
  color:white;
  text-decoration:none;
  margin-left:25px;
  transition:0.3s;
}

.nav a:hover{
  color:#38bdf8;
  transform:scale(1.1);
}

/* HERO */
.hero{
  text-align:center;
  margin-top:90px;
}

.hero h1{
  font-size:50px;

  opacity:0;
  transform:translateY(30px);
  animation:up 1s ease forwards;
  animation-delay:0.3s;
}

.hero p{
  color:#cbd5e1;

  opacity:0;
  transform:translateY(30px);
  animation:up 1s ease forwards;
  animation-delay:0.6s;
}

/* BUTTON */
.btn{
  margin-top:25px;
  padding:14px 30px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;

  opacity:0;
  transform:scale(0.8);
  animation:pop 1s ease forwards;
  animation-delay:0.9s;
}

.btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px #38bdf8;
}

/* FEATURES */
.features{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:70px;
  flex-wrap:wrap;
  padding:20px;
}

/* CARD ANIMATION */
.card{
  background:#111827;
  padding:22px;
  width:220px;
  border-radius:15px;
  text-align:center;
  transition:0.3s;

  opacity:0;
  transform:translateY(40px);
  animation:cardIn 0.8s ease forwards;
}

/* كل كارت يظهر بعد اللي قبله */
.card:nth-child(1){animation-delay:1.1s;}
.card:nth-child(2){animation-delay:1.3s;}
.card:nth-child(3){animation-delay:1.5s;}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #38bdf8;
}

/* KEYFRAMES */
@keyframes up{
  to{opacity:1;transform:translateY(0);}
}

@keyframes pop{
  to{opacity:1;transform:scale(1);}
}

@keyframes cardIn{
  to{opacity:1;transform:translateY(0);}
}
</style>

</head>

<body>

<div class="nav">
  <div class="logo">MARO</div>

  <div>
    <a href="index.html">Home</a>
    <a href="cv.html">Bioo</a>
    <a href="shop.html">Store</a>
  </div>
</div>

<div class="hero">
  <h1>Welcome to MARO Store</h1>
  <p>Official Fashion Brand Website</p>

  <button class="btn" onclick="location.href='shop.html'">
    Go to Store
  </button>
</div>

<div class="features">

  <div class="card">
    <h3>Quality</h3>
    <p>Premium materials</p>
  </div>

  <div class="card">
    <h3>Design</h3>
    <p>Modern streetwear style</p>
  </div>

  <div class="card">
    <h3>Price</h3>
    <p>Affordable fashion</p>
  </div>

</div>

</body>
</html>
