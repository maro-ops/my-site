<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MARO STORE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:#0f172a;
}

.logo{
  font-size:26px;
  font-weight:bold;
  color:#38bdf8;
}

.nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
}

.nav a:hover{
  color:#38bdf8;
}

/* HERO */
.hero{
  text-align:center;
  margin-top:110px;
}

.hero h1{
  font-size:50px;
}

.hero p{
  color:#cbd5e1;
  margin-top:10px;
}

/* BUTTON */
.btn{
  margin-top:25px;
  padding:14px 30px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #38bdf8;
}
</style>

</head>

<body>

<div class="nav">
  <div class="logo">MARO</div>

  <div>
    <a href="index.html">Home</a>
    <a href="cv.html">Bioo</a>
    <a href="shop.html">Store</a>
  </div>
</div>

<div class="hero">
  <h1>Welcome to MARO Store</h1>
  <p>Official Fashion Brand Website</p>

  <button class="btn" onclick="location.href='shop.html'">
    Go to Store
  </button>
</div>

</body>
</html>
