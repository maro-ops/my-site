<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart</title>

<style>
body{
margin:0;font-family:Arial;
background:#0a0f1c;color:white;
padding:40px;
}

.item{
background:#111827;
padding:15px;
margin:10px 0;
border-radius:10px;
}

.total{
margin-top:20px;
color:#38bdf8;
font-size:22px;
}
</style>
</head>

<body>

<h1>Your Cart</h1>

<div id="list"></div>
<div class="total" id="total"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let list = document.getElementById("list");
let total = 0;

cart.forEach(item=>{
total += item.price;

list.innerHTML += `
<div class="item">
${item.name} - ${item.price} EGP
</div>`;
});

document.getElementById("total").innerText =
"Total: " + total + " EGP";
</script>

</body>
</html>
