<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MARO | Bioo</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
}

/* UP */
@keyframes up {
  from{opacity:0;transform:translateY(40px);}
  to{opacity:1;transform:translateY(0);}
}

.up{
  opacity:0;
  animation:up 0.8s ease forwards;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:#0f172a;
}

.logo{
  font-size:26px;
  font-weight:bold;
  color:#38bdf8;
}

.nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
}

/* BIO CARD */
.container{
  text-align:center;
  margin-top:120px;
}

.card{
  background:#111827;
  width:300px;
  margin:auto;
  padding:30px;
  border-radius:15px;
}
.city{
  color:#38bdf8;
}
</style>

</head>

<body>

<div class="nav up">
  <div class="logo">MARO</div>

  <div>
    <a href="index.html">Home</a>
    <a href="cv.html">Bioo</a>
    <a href="shop.html">Store</a>
  </div>
</div>

<div class="container">

  <h1 class="up" style="animation-delay:0.2s">BIOO</h1>

  <div class="card up" style="animation-delay:0.4s">
    <p><b>Name:</b> MAROOO</p>
    <p><b>Age:</b> 19</p>
    <p class="city">EGYPT 🇪🇬</p>
  </div>

</div>

</body>
</html>
