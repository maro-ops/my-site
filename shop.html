<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MARO STORE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
}

/* UP */
@keyframes up {
  from{opacity:0;transform:translateY(40px);}
  to{opacity:1;transform:translateY(0);}
}

.up{
  opacity:0;
  animation:up 0.8s ease forwards;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:#0f172a;
}

.logo{
  font-size:26px;
  font-weight:bold;
  color:#38bdf8;
}

.nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
}

/* TITLE */
.title{
  text-align:center;
  margin-top:50px;
}

/* PRODUCTS */
.products{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:50px;
  padding:20px;
}

.card{
  background:#111827;
  width:220px;
  padding:25px;
  border-radius:15px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #38bdf8;
}

.price{
  color:#38bdf8;
  font-weight:bold;
}

button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="nav up">
  <div class="logo">MARO</div>

  <div>
    <a href="index.html">Home</a>
    <a href="cv.html">Bioo</a>
    <a href="shop.html">Store</a>
  </div>
</div>

<div class="title">
  <h1 class="up" style="animation-delay:0.2s">MARO STORE</h1>
  <p class="up" style="animation-delay:0.4s">Minimal Fashion Collection</p>
</div>

<div class="products">

  <div class="card up" style="animation-delay:0.2s">
    <h3>HOODIE</h3>
    <p class="price">450 EGP</p>
    <button>Buy</button>
  </div>

  <div class="card up" style="animation-delay:0.4s">
    <h3>T-SHIRT</h3>
    <p class="price">250 EGP</p>
    <button>Buy</button>
  </div>

  <div class="card up" style="animation-delay:0.6s">
    <h3>SWEATPANTS</h3>
    <p class="price">400 EGP</p>
    <button>Buy</button>
  </div>

  <div class="card up" style="animation-delay:0.8s">
    <h3>JEANS</h3>
    <p class="price">600 EGP</p>
    <button>Buy</button>
  </div>

</div>

</body>
</html>
