<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MARO STORE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
}

.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:#0f172a;
}

.logo{
  color:#38bdf8;
  font-size:24px;
  font-weight:bold;
}

.nav a{
  color:white;
  text-decoration:none;
  margin-left:25px;
}

.title{
  text-align:center;
  margin-top:50px;
}

.title h1{
  font-size:40px;
}

.products{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-top:50px;
}

.card{
  background:#111827;
  padding:25px;
  width:220px;
  border-radius:18px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #38bdf8;
}

.price{
  color:#38bdf8;
  font-weight:bold;
  margin:10px 0;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="nav">
  <div class="logo">MARO</div>

  <div>
    <a href="index.html">Home</a>
    <a href="cv.html">Bioo</a>
    <a href="shop.html">Store</a>
  </div>
</div>

<div class="title">
  <h1>MARO STORE</h1>
  <p>Luxury Streetwear Collection</p>
</div>

<div class="products">

  <div class="card">
    <h3>HOODIE</h3>
    <p class="price">450 EGP</p>
    <button>Buy</button>
  </div>

  <div class="card">
    <h3>T-SHIRT</h3>
    <p class="price">250 EGP</p>
    <button>Buy</button>
  </div>

  <div class="card">
    <h3>SWEATPANTS</h3>
    <p class="price">400 EGP</p>
    <button>Buy</button>
  </div>

  <div class="card">
    <h3>JEANS</h3>
    <p class="price">600 EGP</p>
    <button>Buy</button>
  </div>

</div>

</body>
</html>
