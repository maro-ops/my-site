<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MARO STORE</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
  overflow-x:hidden;
}

/* ANIMATION */

@keyframes up{
  from{
    opacity:0;
    transform:translateY(40px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

.up{
  opacity:0;
  animation:up 0.8s ease forwards;
}

/* NAVBAR */

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background:#0f172a;
}

.logo{
  font-size:28px;
  font-weight:bold;
  color:#38bdf8;
  letter-spacing:4px;
}

.nav a{
  color:white;
  text-decoration:none;
  margin-left:25px;
  transition:0.3s;
}

.nav a:hover{
  color:#38bdf8;
}

/* TITLE */

.title{
  text-align:center;
  margin-top:60px;
}

.title h1{
  font-size:50px;
}

.title p{
  color:#cbd5e1;
}

/* PRODUCTS */

.products{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:25px;
  margin-top:60px;
  padding:20px;
}

.card{
  background:#111827;
  width:230px;
  padding:25px;
  border-radius:16px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 18px #38bdf8;
}

.card h3{
  margin-bottom:15px;
}

.card p{
  color:#cbd5e1;
  line-height:1.7;
  font-size:18px;
}

button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="nav up">

  <div class="logo">MARO</div>

  <div>
    <a href="index.html">Home</a>
    <a href="cv.html">Bioo</a>
    <a href="shop.html">Store</a>
  </div>

</div>

<!-- TITLE -->

<div class="title">

  <h1 class="up" style="animation-delay:0.2s">
    MARO STORE
  </h1>

  <p class="up" style="animation-delay:0.4s">
    Minimal Fashion Collection
  </p>

</div>

<!-- PRODUCTS -->

<div class="products">

  <div class="card up" style="animation-delay:0.6s">

    <h3>HOODIE</h3>

    <p dir="rtl">
      تفتكر هيبقا بكام 🔥؟
    </p>

    <button>Coming Soon</button>

  </div>

  <div class="card up" style="animation-delay:0.8s">

    <h3>T-SHIRT</h3>

    <p dir="rtl">
      تفتكر هيبقا بكام 🔥؟
    </p>

    <button>Coming Soon</button>

  </div>

  <div class="card up" style="animation-delay:1s">

    <h3>SWEATPANTS</h3>

    <p dir="rtl">
      تفتكر هيبقا بكام 🔥؟
    </p>

    <button>Coming Soon</button>

  </div>

  <div class="card up" style="animation-delay:1.2s">

    <h3>JEANS</h3>

    <p dir="rtl">
      تفتكر هيبقا بكام 🔥؟
    </p>

    <button>Coming Soon</button>

  </div>

</div>

</body>
</html>
