<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MARO STORE</title>

<style>
body{margin:0;font-family:Arial;background:#0a0f1c;color:white;}

.nav{
display:flex;justify-content:space-between;
padding:20px 50px;background:#0f172a;
}

.logo{color:#38bdf8;font-size:24px;font-weight:bold;}

.cartBox{background:#111827;padding:8px 15px;border-radius:10px;}

.title{text-align:center;margin-top:40px;}

.products{
display:flex;justify-content:center;flex-wrap:wrap;
gap:20px;margin-top:40px;
}

.card{
background:#111827;width:220px;
padding:20px;border-radius:15px;
text-align:center;
}

.price{color:#38bdf8;font-weight:bold;}

button{
margin-top:10px;padding:10px;
background:#22c55e;color:white;
border:none;border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="nav">
<div class="logo">MARO</div>

<div class="cartBox">
Cart: <span id="count">0</span> | <span id="total">0</span> EGP
</div>
</div>

<div class="title">
<h1>MARO STORE</h1>
</div>

<div class="products">

<div class="card">
<h3>HOODIE</h3>
<p class="price">450 EGP</p>
<button onclick="add('HOODIE',450)">Add</button>
</div>

<div class="card">
<h3>T-SHIRT</h3>
<p class="price">250 EGP</p>
<button onclick="add('T-SHIRT',250)">Add</button>
</div>

<div class="card">
<h3>SWEATPANTS</h3>
<p class="price">400 EGP</p>
<button onclick="add('SWEATPANTS',400)">Add</button>
</div>

<div class="card">
<h3>JEANS</h3>
<p class="price">600 EGP</p>
<button onclick="add('JEANS',600)">Add</button>
</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = cart.reduce((a,b)=>a+b.price,0);

update();

function add(name,price){
cart.push({name,price});
localStorage.setItem("cart",JSON.stringify(cart));

total += price;
update();
}

function update(){
document.getElementById("count").innerText = cart.length;
document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
